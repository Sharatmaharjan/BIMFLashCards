<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashzy Pro • Unit 4: Data Link Layer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
body{font-family:'Poppins',system-ui,sans-serif}
.perspective{perspective:1400px}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,.2,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:24px}
.card-front{background:linear-gradient(135deg,#27272a,#18181b)}
.card-back{background:linear-gradient(135deg,#1e40af,#18181b);transform:rotateY(180deg)}
</style>
</head>

<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">

<div class="max-w-4xl w-full px-4 py-8">

<!-- HEADER -->
<div class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-cyan-500 text-black rounded-2xl flex items-center justify-center text-3xl">🔗</div>
        <div>
            <h1 class="text-3xl font-bold">Flashzy Pro</h1>
            <p class="text-cyan-400">Unit 4: Data Link Layer (5 LHrs)</p>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <div onclick="showReviewAllModal()" class="flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-3xl cursor-pointer">
            <span class="text-xs uppercase text-zinc-400">Progress</span>
            <span class="flex gap-4 text-sm">
                <span>✅ <span id="known-count" class="font-bold">0</span></span>
                <span>📌 <span id="review-count" class="font-bold">0</span></span>
            </span>
        </div>

        <div class="flex items-center gap-3 bg-zinc-900 px-5 py-2 rounded-3xl">
            <span class="text-xs text-zinc-400">SHUFFLE</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="shuffle-toggle" onchange="toggleShuffle()" class="sr-only peer">
                <div class="w-11 h-6 bg-zinc-700 peer-focus:ring-4 peer-focus:ring-cyan-400 rounded-full peer peer-checked:bg-cyan-400"></div>
            </label>
        </div>

        <button onclick="showResults()" class="bg-white text-black px-6 py-3 rounded-3xl font-semibold">📊 RESULTS</button>
    </div>
</div>

<!-- CARD -->
<div class="relative max-w-2xl mx-auto">
    <div onclick="flipCard()" class="perspective h-[420px] cursor-pointer">
        <div id="card-inner" class="card-inner border border-zinc-700 rounded-3xl">
            <div class="card-face card-front">
                <div class="text-cyan-400 text-3xl mb-6">🔗</div>
                <div id="front-text" class="text-3xl font-semibold max-w-md"></div>
                <div class="absolute bottom-6 text-xs text-zinc-500 uppercase">Tap / Space to flip</div>
            </div>
            <div class="card-face card-back">
                <div class="text-emerald-400 text-sm uppercase mb-4">ANSWER</div>
                <div id="back-text" class="text-xl text-emerald-100 max-w-md leading-relaxed"></div>
                <div class="absolute bottom-6 text-xs text-emerald-400/80 uppercase">Unit 4 • Data Link Layer</div>
            </div>
        </div>
    </div>

    <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-zinc-900 text-cyan-400 text-xs px-5 py-1 rounded-full">
        <span id="card-number">1</span>
        <span class="text-zinc-600">/</span>
        <span id="total-cards">30</span>
    </div>
</div>

<!-- CONTROLS -->
<div class="max-w-2xl mx-auto mt-10 flex justify-between items-center">
    <button onclick="prevCard()" class="bg-zinc-900 px-6 py-3 rounded-3xl">← Prev</button>
    <div class="flex gap-4">
        <button onclick="markKnown();event.stopImmediatePropagation()" class="bg-emerald-500 px-6 py-3 rounded-3xl">✅ Known</button>
        <button onclick="markReview();event.stopImmediatePropagation()" class="bg-amber-500 px-6 py-3 rounded-3xl">📌 Review</button>
    </div>
    <button onclick="nextCard()" class="bg-zinc-900 px-6 py-3 rounded-3xl">Next →</button>
</div>

<div onclick="toggleReviewMode()" id="review-mode-btn" class="mx-auto mt-6 flex items-center gap-3 bg-zinc-900 hover:bg-zinc-800 px-8 py-3 rounded-3xl cursor-pointer text-sm font-medium">
    <span id="review-mode-text">ALL CARDS</span>
    <span class="text-amber-400">📌</span>
</div>

</div>

<!-- RESULTS MODAL -->
<div id="results-modal" onclick="if(event.target.id==='results-modal')hideResultsModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 max-w-md w-full mx-4 rounded-3xl p-8">
        <h2 class="text-3xl font-bold mb-6">Study Summary</h2>
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-zinc-800 p-6 rounded-3xl text-center"><div id="modal-total" class="text-5xl font-bold">30</div><div class="text-xs text-zinc-400">Total</div></div>
            <div class="bg-emerald-900/30 border border-emerald-400 p-6 rounded-3xl text-center"><div id="modal-known" class="text-5xl font-bold text-emerald-400">0</div><div class="text-xs text-emerald-400">Known</div></div>
            <div class="bg-amber-900/30 border border-amber-400 p-6 rounded-3xl text-center"><div id="modal-review" class="text-5xl font-bold text-amber-400">0</div><div class="text-xs text-amber-400">Review</div></div>
        </div>
        <div id="trophy" class="hidden text-center text-7xl mb-4">🏆</div>
        <div id="motivational-text" class="italic text-center bg-zinc-800 p-6 rounded-3xl"></div>
        <div class="flex gap-3 mt-8">
            <button onclick="hideResultsModal();restartStudy()" class="flex-1 py-4 bg-zinc-800 rounded-3xl">RESTART</button>
            <button onclick="shareProgress()" class="flex-1 py-4 bg-cyan-400 text-black rounded-3xl font-semibold">SHARE PROGRESS</button>
        </div>
    </div>
</div>

<!-- REVIEW ALL MODAL -->
<div id="review-all-modal" onclick="if(event.target.id==='review-all-modal')hideReviewAllModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl overflow-hidden">
        <div class="px-8 py-6 border-b flex justify-between"><h3 class="font-bold text-xl">All 30 Cards • Status</h3><button onclick="hideReviewAllModal()" class="text-3xl">×</button></div>
        <div id="card-list" class="max-h-[420px] overflow-auto p-4 space-y-2"></div>
        <div class="p-4"><button onclick="hideReviewAllModal()" class="w-full py-4 bg-zinc-800 rounded-3xl">CLOSE</button></div>
    </div>
</div>

<script>
const originalCards = [
{front:"What is the main responsibility of the Data Link Layer?",back:"Reliable node-to-node delivery of data frames between directly connected devices."},
{front:"Key Functions of Data Link Layer",back:"Framing, Physical Addressing (MAC), Error Control, Flow Control, Media Access Control."},
{front:"What is Media Access Control (MAC)?",back:"Sublayer that controls how devices access the shared transmission medium."},
{front:"CSMA/CD",back:"Carrier Sense Multiple Access with Collision Detection – used in wired Ethernet (half-duplex)."},
{front:"CSMA/CA",back:"Carrier Sense Multiple Access with Collision Avoidance – used in Wi-Fi to prevent collisions."},
{front:"Difference between CSMA/CD and CSMA/CA",back:"CD detects collisions after they occur (wired). CA avoids collisions before they happen (wireless)."},
{front:"Controlled Access Methods",back:"Polling and Token Passing – no collisions, predictable performance."},
{front:"Token Passing",back:"A token circulates in a ring; only the station holding the token can transmit."},
{front:"Polling",back:"A primary device asks secondary devices in order if they have data to send."},
{front:"Sources of Errors in Transmission",back:"Noise, Attenuation, Distortion, Jitter, Crosstalk."},
{front:"Error Detection Methods",back:"Parity Check, Checksum, Cyclic Redundancy Check (CRC)."},
{front:"Cyclic Redundancy Check (CRC)",back:"Powerful method using polynomial division; excellent for detecting burst errors."},
{front:"Stop-and-Wait ARQ",back:"Sender transmits one frame and waits for ACK before sending the next."},
{front:"Go-Back-N ARQ",back:"Sender sends multiple frames; on error, retransmits the bad frame and all subsequent frames."},
{front:"Selective Repeat ARQ",back:"Only the erroneous frame is retransmitted; receiver buffers out-of-order frames."},
{front:"Forward Error Correction (FEC)",back:"Receiver can correct errors using redundant bits without retransmission."},
{front:"Asynchronous vs Synchronous Transmission",back:"Async: character by character with start/stop bits. Sync: continuous blocks with clock sync."},
{front:"Advantages of Synchronous Transmission",back:"Higher efficiency, lower overhead, better for high-speed continuous data."},
{front:"Transmission Efficiency in Stop-and-Wait",back:"Efficiency = Tf / (Tf + 2Tp) – very low for high propagation delay links."},
{front:"What is Framing?",back:"Dividing bit stream from Physical Layer into manageable data frames."},
{front:"Physical Addressing",back:"Adding MAC addresses to identify source and destination on local network."},
{front:"Flow Control",back:"Regulates data rate to prevent overwhelming the receiver."},
{front:"Hidden Terminal Problem",back:"Stations that cannot hear each other but both can reach the access point."},
{front:"RTS/CTS Mechanism",back:"Request to Send / Clear to Send handshake to reserve the medium in wireless networks."},
{front:"Why is CRC preferred over Parity/CheckSum?",back:"Excellent detection of burst errors with low overhead."},
{front:"Comparison of ARQ Protocols",back:"Stop-and-Wait (simple, inefficient), Go-Back-N (medium), Selective Repeat (most efficient)."},
{front:"Role of MAC Sublayer",back:"Handles contention and controlled access to shared medium."},
{front:"LLC vs MAC",back:"LLC handles flow/error control; MAC handles medium access."},
{front:"Practical Example of Data Link Layer",back:"Ethernet frames, Wi-Fi (802.11), PPP."},
{front:"Memory Tip for Data Link Layer",back:"Framing + MAC + Error/Flow Control = Reliable hop-by-hop delivery."}
]

let deck = []
let statuses = new Array(30).fill("not-studied")
let current = 0
let flipped = false
let shuffle = false
let studyMode = "all"

function shuffleArray(arr) {
    const shuffled = [...arr]
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]
    }
    return shuffled
}

function prepareDeck() {
    let indices = [...Array(30).keys()]
    if (studyMode === "review") indices = indices.filter(i => statuses[i] === "review")
    if (shuffle) indices = shuffleArray(indices)
    deck = indices
    current = 0
    loadCard()
}

function loadCard() {
    let idx = deck[current]
    let card = originalCards[idx]
    document.getElementById("front-text").textContent = card.front
    document.getElementById("back-text").innerHTML = card.back
    document.getElementById("card-number").textContent = current + 1
    document.getElementById("total-cards").textContent = deck.length
    document.getElementById("card-inner").classList.remove("flipped")
    flipped = false
}

function flipCard() {
    flipped = !flipped
    document.getElementById("card-inner").classList.toggle("flipped")
}

function nextCard(){if(current<deck.length-1){current++;loadCard()}}
function prevCard(){if(current>0){current--;loadCard()}}

function markKnown(){
    statuses[deck[current]]="known"
    updateProgress()
    setTimeout(()=>{if(current<deck.length-1)nextCard()},300)
}
function markReview(){
    statuses[deck[current]]="review"
    updateProgress()
    setTimeout(()=>{if(current<deck.length-1)nextCard()},300)
}

function updateProgress(){
    let known = statuses.filter(s=>s==="known").length
    let review = statuses.filter(s=>s==="review").length
    document.getElementById("known-count").textContent = known
    document.getElementById("review-count").textContent = review
}

function toggleShuffle(){
    shuffle = document.getElementById("shuffle-toggle").checked
    prepareDeck()
}

function toggleReviewMode(){
    studyMode = studyMode==="all"?"review":"all"
    document.getElementById("review-mode-text").textContent = studyMode==="all"?"ALL CARDS":"REVIEW ONLY"
    prepareDeck()
}

function showResults(){
    let known = statuses.filter(s=>s==="known").length
    let review = statuses.filter(s=>s==="review").length
    let percent = Math.round(((known+review)/30)*100)
    document.getElementById("modal-total").textContent = 30
    document.getElementById("modal-known").textContent = known
    document.getElementById("modal-review").textContent = review
    document.getElementById("motivational-text").innerHTML = percent > 80 ? "Excellent! Data Link Layer concepts mastered 🏆" : "Good progress! Review the marked cards."
    document.getElementById("trophy").classList.toggle("hidden", percent <= 80)
    document.getElementById("results-modal").classList.remove("hidden")
}

function hideResultsModal(){document.getElementById("results-modal").classList.add("hidden")}

function shareProgress(){
    let known = statuses.filter(s=>s==="known").length
    let review = statuses.filter(s=>s==="review").length
    let percent = Math.round(((known+review)/30)*100)
    navigator.clipboard.writeText(`Flashzy Pro Unit 4: ${percent}% complete!\n✅ Known: ${known}\n📌 Review: ${review}\n\nMastered MAC, Error Control & ARQ! #FlashzyPro`)
    alert("Progress copied to clipboard ✅")
}

function showReviewAllModal(){
    let html = ""
    originalCards.forEach((c,i)=>{
        let badge = statuses[i]==="known"?`<span class="bg-emerald-500 text-white px-3 py-1 text-xs rounded-full">KNOWN</span>`:
                   statuses[i]==="review"?`<span class="bg-amber-500 text-white px-3 py-1 text-xs rounded-full">REVIEW</span>`:
                   `<span class="bg-zinc-700 text-zinc-400 px-3 py-1 text-xs rounded-full">NOT STUDIED</span>`
        html += `<div class="flex justify-between bg-zinc-800 p-4 rounded-2xl text-sm">${c.front}${badge}</div>`
    })
    document.getElementById("card-list").innerHTML = html
    document.getElementById("review-all-modal").classList.remove("hidden")
}
function hideReviewAllModal(){document.getElementById("review-all-modal").classList.add("hidden")}

function restartStudy(){
    hideResultsModal()
    statuses = new Array(30).fill("not-studied")
    updateProgress()
    prepareDeck()
}

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowRight") nextCard()
    if(e.key==="ArrowLeft") prevCard()
    if(e.key===" "){e.preventDefault();flipCard()}
})

prepareDeck()
updateProgress()
console.log("%c✅ Flashzy Pro Unit 4 loaded successfully with perfect flip animation 🚀","color:#22d3ee;font-family:monospace")
</script>
</body>
</html>
